
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الوقت الآن</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    background:#101820;
    color:#fff;
    padding:25px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:35px;
}

.main-clock{
    background:#1a2639;
    border-radius:20px;
    padding:25px;
    text-align:center;
    margin-bottom:30px;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

.main-clock h2{
    font-size:28px;
    margin-bottom:10px;
}

.main-time{
    font-size:42px;
    font-weight:bold;
    color:#4fc3f7;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
}

.card{
    background:#1a2639;
    border-radius:18px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,.35);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.country{
    font-size:24px;
    margin-bottom:15px;
}

.time{
    font-size:34px;
    color:#4fc3f7;
    font-weight:bold;
}

.diff{
    margin-top:12px;
    color:#9fdfff;
    font-size:15px;
}

@media(max-width:600px){
.main-time{
font-size:34px;
}
.time{
font-size:28px;
}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
</head>
<body>

<h1>🌍 الوقت الآن</h1>

<div class="main-clock">
<h2>🇪🇬 مصر</h2>
<div id="egypt" class="main-time"></div>
</div>

<div class="container">

<div class="card">
<div class="country">🇮🇶 العراق</div>
<div id="iraq" class="time"></div>
<div id="diff-iraq" class="diff">(+1 عن مصر)</div>
</div>

<div class="card">
<div class="country">🇦🇪 الإمارات</div>
<div id="uae" class="time"></div>
<div id="diff-uae" class="diff">(+2 عن مصر)</div>
</div>

<div class="card">
<div class="country">🇧🇭 البحرين</div>
<div id="bahrain" class="time"></div>
<div id="diff-bahrain" class="diff">(+1 عن مصر)</div>
</div>

<div class="card">
<div class="country">🇯🇴 الأردن</div>
<div id="jordan" class="time"></div>
<div id="diff-jordan" class="diff">(نفس توقيت مصر)</div>
</div>

<div class="card">
<div class="country">🇰🇼 الكويت</div>
<div id="kuwait" class="time"></div>
<div id="diff-kuwait" class="diff">(+1 عن مصر)</div>
</div>

<div class="card">
<div class="country">🇶🇦 قطر</div>
<div id="qatar" class="time"></div>
<div id="diff-qatar" class="diff">(+1 عن مصر)</div>
</div>

<div class="card">
<div class="country">🇴🇲 عمان</div>
<div id="oman" class="time"></div>
<div id="diff-oman" class="diff">(+2 عن مصر)</div>
</div>

</div>

<script>
const DateTime=luxon.DateTime;
function fmt(zone){return DateTime.now().setZone(zone).toFormat("hh:mm:ss a").replace("AM","صباحًا").replace("PM","مساءً");}
function show(id,z){document.getElementById(id).textContent=fmt(z);}
function diff(id,z){let e=DateTime.now().setZone("Africa/Cairo").offset,c=DateTime.now().setZone(z).offset,d=(c-e)/60;document.getElementById(id).textContent=d==0?"نفس توقيت مصر":`${d>0?"+":""}${d} ساعة عن مصر`;}
function update(){show("egypt","Africa/Cairo");show("iraq","Asia/Baghdad");show("uae","Asia/Dubai");show("bahrain","Asia/Bahrain");show("jordan","Asia/Amman");show("kuwait","Asia/Kuwait");show("qatar","Asia/Qatar");show("oman","Asia/Muscat");diff("diff-iraq","Asia/Baghdad");diff("diff-uae","Asia/Dubai");diff("diff-bahrain","Asia/Bahrain");diff("diff-jordan","Asia/Amman");diff("diff-kuwait","Asia/Kuwait");diff("diff-qatar","Asia/Qatar");diff("diff-oman","Asia/Muscat");}
update();setInterval(update,1000);
</script>

</body>
</html>
